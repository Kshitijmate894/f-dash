<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financial Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0d1117;--surface:#161b22;--card:#21262d;
    --border:#30363d;--border-light:#21262d;
    --green:#3fb950;--red:#f85149;--amber:#d29922;--blue:#58a6ff;--purple:#a371f7;
    --text:#e6edf3;--muted:#8b949e;--muted2:#6e7681;
    --mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}

  main{padding:28px;max-width:1440px;margin:0 auto;}

  /* KPI GRID UPDATED → 6 columns */
  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:12px;
    margin-bottom:24px;
  }

  .kpi-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:16px;
  }

  .kpi-label{font-size:11px;color:var(--muted);}
  .kpi-value{font-family:var(--mono);font-size:20px;margin-top:6px;}
  .kpi-sub,.kpi-sub2{font-size:11px;color:var(--muted2);margin-top:4px;}

  .green{color:var(--green);}
  .red{color:var(--red);}
  .blue{color:var(--blue);}
  .purple{color:var(--purple);}
  .amber{color:var(--amber);}

  .chart-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
  }

  .canvas-wrap{height:300px;}
</style>
</head>

<body>
<main>

<!-- KPI GRID -->
<div class="kpi-grid">

  <div class="kpi-card green">
    <div class="kpi-label">Avg Monthly Income</div>
    <div class="kpi-value" id="kpiIncome">—</div>
  </div>

  <div class="kpi-card red">
    <div class="kpi-label">Spending Rate</div>
    <div class="kpi-value" id="kpiSpendRate">—</div>
  </div>

  <div class="kpi-card purple">
    <div class="kpi-label">Savings Rate</div>
    <div class="kpi-value" id="kpiSaveRate">—</div>
  </div>

  <div class="kpi-card blue">
    <div class="kpi-label">Net Worth</div>
    <div class="kpi-value" id="kpiNetworth">—</div>
  </div>

  <div class="kpi-card amber">
    <div class="kpi-label">MOM Growth</div>
    <div class="kpi-value" id="kpiMom">—</div>
  </div>

  <!-- ✅ NEW: $1M PROJECTION -->
  <div class="kpi-card green">
    <div class="kpi-label">$1M Projection</div>
    <div class="kpi-value" id="kpiMillion">—</div>
    <div class="kpi-sub" id="kpiMillionSub">—</div>
    <div class="kpi-sub2" id="kpiMillionSub2">—</div>
  </div>

</div>

<!-- PROJECTION CHART -->
<div class="chart-card">
  <div class="kpi-label">$1M NET WORTH PROJECTION</div>
  <div class="canvas-wrap">
    <canvas id="projectionChart"></canvas>
  </div>
</div>

</main>

<script>
let charts = {};

// ---------- helpers ----------
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
const fmt = n => '$' + Math.round(n).toLocaleString();
const fmtPct = n => (n>=0?'+':'') + n.toFixed(1) + '%';

function projectMillionaireDate(nw, monthly, rate){
  const target = 1_000_000;
  let m = 0;
  let bal = nw;

  while(bal < target && m < 1000){
    bal = bal * (1 + rate/12) + monthly;
    m++;
  }

  const d = new Date();
  d.setMonth(d.getMonth() + m);

  return {
    label: d.toLocaleDateString('en-US',{month:'short',year:'numeric'}),
    months: m
  };
}

// ---------- MAIN UPDATE ----------
function renderKPIs(rows){

  const incomes = rows.map(r=>r.tinc);
  const spends  = rows.map(r=>r.spend);
  const saves   = rows.map(r=>r.save);
  const mom     = rows.map(r=>r.mom);

  const lastNW = rows.at(-1).networth;

  document.getElementById('kpiIncome').textContent = fmt(avg(incomes));
  document.getElementById('kpiSpendRate').textContent =
    fmtPct((avg(spends)/avg(incomes))*100);

  document.getElementById('kpiSaveRate').textContent =
    fmtPct((avg(saves)/avg(incomes))*100);

  document.getElementById('kpiNetworth').textContent = fmt(lastNW);
  document.getElementById('kpiMom').textContent = fmtPct(avg(mom));

  // ---------- PROJECTION ----------
  const monthlySave = avg(saves);

  const cons = projectMillionaireDate(lastNW, monthlySave, 0.05);
  const real = projectMillionaireDate(lastNW, monthlySave, 0.08);
  const aggr = projectMillionaireDate(lastNW, monthlySave, 0.12);

  document.getElementById('kpiMillion').textContent = real.label;
  document.getElementById('kpiMillionSub').textContent =
    `Aggressive: ${aggr.label}`;

  document.getElementById('kpiMillionSub2').textContent =
    `Conservative: ${cons.label}`;
}

// ---------- CHART ----------
function renderProjectionChart(rows){

  const start = rows.at(-1).networth;
  const save = avg(rows.map(r=>r.save));
  const months = 180;

  function build(rate){
    let v = start;
    let arr = [];
    for(let i=0;i<months;i++){
      v = v * (1 + rate/12) + save;
      arr.push(v);
    }
    return arr;
  }

  const labels = Array.from({length:months},(_,i)=>{
    const d = new Date();
    d.setMonth(d.getMonth()+i);
    return d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
  });

  if(charts.proj) charts.proj.destroy();

  charts.proj = new Chart(
    document.getElementById('projectionChart'),
    {
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'Conservative',data:build(0.05),borderColor:'#f85149',pointRadius:0},
          {label:'Realistic',data:build(0.08),borderColor:'#58a6ff',pointRadius:0},
          {label:'Aggressive',data:build(0.12),borderColor:'#3fb950',pointRadius:0},
          {label:'$1M',data:Array(months).fill(1_000_000),
           borderColor:'#d29922',borderDash:[6,6],pointRadius:0}
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false
      }
    }
  );
}

// ---------- DEMO CALL ----------
function initDemo(){

  // replace this with your real data hook
  const rows = window.allRows || [];

  if(!rows.length){
    console.log("No data yet");
    return;
  }

  renderKPIs(rows);
  renderProjectionChart(rows);
}

window.initDemo = initDemo;
</script>

</body>
</html>
