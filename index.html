<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financial Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#0d1117;
  --surface:#161b22;
  --card:#21262d;
  --border:#30363d;
  --border-light:#21262d;

  --green:#3fb950;
  --red:#f85149;
  --amber:#d29922;
  --blue:#58a6ff;
  --purple:#a371f7;

  --text:#e6edf3;
  --muted:#8b949e;
  --muted2:#6e7681;

  --mono:'IBM Plex Mono',monospace;
  --sans:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  padding:24px;
}

.container{
  max-width:1400px;
  margin:0 auto;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-bottom:18px;
}

.title{
  font-size:22px;
  font-weight:600;
  margin-bottom:18px;
}

.goal-title{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--muted);
  margin-bottom:8px;
}

.goal-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}

.goal-percent{
  font-size:26px;
  font-family:var(--mono);
  color:var(--blue);
}

.goal-sub{
  font-size:12px;
  color:var(--muted2);
  font-family:var(--mono);
  margin-top:6px;
  line-height:1.6;
}

/* Progress */

.progress-track{
  position:relative;
  width:100%;
  height:12px;
  background:var(--card);
  border-radius:999px;
  margin-top:20px;
  overflow:hidden;
  cursor:pointer;
}

.progress-fill{
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  background:linear-gradient(90deg,#58a6ff,#a371f7);
  border-radius:999px;
}

.milestone-mark{
  position:absolute;
  top:-2px;
  bottom:-2px;
  width:1px;
  background:rgba(255,255,255,0.2);
}

.milestone-mark.major{
  width:2px;
  background:rgba(255,255,255,0.45);
}

.progress-tooltip{
  position:absolute;
  top:-38px;
  transform:translateX(-50%);
  background:var(--card);
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:6px;
  font-size:11px;
  font-family:var(--mono);
  display:none;
  white-space:nowrap;
}

.milestone-labels{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:10px;
  color:var(--muted2);
  font-family:var(--mono);
}

/* Scenario Cards */

.goal-scenarios{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:24px;
}

.scenario-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  cursor:pointer;
  transition:all 0.15s ease;
  position:relative;
}

.scenario-card:hover{
  transform:translateY(-2px);
  border-color:var(--blue);
}

.scenario-card.selected{
  border:2px solid var(--blue);
  background:rgba(88,166,255,0.08);
}

.scenario-card::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  right:0;
  height:2px;
}

.scenario-card.conservative::before{
  background:#6e7681;
}

.scenario-card.realistic::before{
  background:var(--blue);
}

.scenario-card.ambitious::before{
  background:var(--green);
}

.scenario-label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:600;
}

.scenario-radio{
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px solid var(--border);
}

.scenario-card.selected .scenario-radio{
  background:var(--blue);
  border-color:var(--blue);
}

.scenario-date{
  font-size:22px;
  font-family:var(--mono);
  margin-bottom:6px;
}

.scenario-detail{
  color:var(--muted2);
  font-size:12px;
  font-family:var(--mono);
}

.scenario-rate{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--border);
  color:var(--muted);
  font-size:11px;
  line-height:1.6;
  font-family:var(--mono);
}

.selected-details{
  margin-top:20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
}

.selected-details-title{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--muted);
  margin-bottom:14px;
}

.milestone-timeline{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.milestone-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--mono);
  font-size:12px;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--blue);
}

.value{
  color:var(--green);
  font-weight:500;
}

.date{
  color:var(--muted2);
}

@media(max-width:800px){
  .goal-scenarios{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="goal-top">

<div>
<div class="goal-title">🎯 $1M Networth Goal</div>

<div class="goal-sub" id="goalSub"></div>
</div>

<div class="goal-percent" id="goalPercent"></div>

</div>

<div class="progress-track" id="goalTrack">

<div class="progress-fill" id="goalFill"></div>

<div class="progress-tooltip" id="goalTooltip"></div>

</div>

<div class="milestone-labels">
<span>$0</span>
<span>$250k</span>
<span>$500k</span>
<span>$750k</span>
<span>$1M</span>
</div>

<div class="goal-scenarios" id="scenarioContainer"></div>

<div id="selectedDetails"></div>

</div>

</div>

<script>

const MONTH_NAMES = [
'January','February','March','April','May','June',
'July','August','September','October','November','December'
];

function fmt(n){
  return '$' + Math.round(n).toLocaleString();
}

function computeWeightedMOM(rows, decay=0.94){

  const vals = rows.map(r=>r.mom/100).filter(v=>isFinite(v));

  if(!vals.length){
    return { rate:0, stdDev:0 };
  }

  let weightedSum = 0;
  let totalWeight = 0;

  vals.forEach((v,i)=>{
    const age = vals.length - 1 - i;
    const weight = Math.pow(decay, age);

    weightedSum += v * weight;
    totalWeight += weight;
  });

  const rate = weightedSum / totalWeight;

  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;

  const variance = vals.reduce((s,v)=>{
    return s + Math.pow(v-avg,2);
  },0)/vals.length;

  return {
    rate,
    stdDev:Math.sqrt(variance)
  };
}

function addMonths(lastRow, months){

  const startMonth = MONTH_NAMES.indexOf(lastRow.month);

  const total = startMonth + months;

  return {
    month:MONTH_NAMES[total % 12],
    year:lastRow.year + Math.floor(total / 12)
  };
}

function monthsToTargetAnnuity(
  current,
  annualRate,
  monthlyContribution,
  target=1000000
){

  if(current >= target){
    return 0;
  }

  const monthlyRate = annualRate / 12;

  let balance = current;

  for(let month=1; month<=1200; month++){

    balance = balance * (1 + monthlyRate) + monthlyContribution;

    if(balance >= target){
      return month;
    }
  }

  return null;
}

let selectedScenario = 'realistic';

const allRows = [
  { month:'January', year:2024, networth:267000, save:5000, mom:4.1 },
  { month:'February', year:2024, networth:278000, save:5200, mom:3.8 },
  { month:'March', year:2024, networth:289000, save:5300, mom:4.0 },
  { month:'April', year:2024, networth:301000, save:5500, mom:4.2 }
];

function renderGoalTile(){

  const TARGET = 1000000;

  const lastRow = allRows[allRows.length-1];

  const lastNW = lastRow.networth;

  const pct = Math.min(lastNW / TARGET * 100, 100);

  document.getElementById('goalPercent').textContent =
    pct.toFixed(1) + '%';

  const { rate:wMOM } = computeWeightedMOM(allRows);

  document.getElementById('goalSub').innerHTML = `
    ${fmt(lastNW)} of ${fmt(TARGET)}
    · ${fmt(TARGET-lastNW)} remaining
    · observed MOM:
    <span style="color:white">${(wMOM*100).toFixed(2)}%</span>
  `;

  document.getElementById('goalFill').style.width =
    pct + '%';

  const track = document.getElementById('goalTrack');

  track.querySelectorAll('.milestone-mark').forEach(e=>e.remove());

  [12.5,25,37.5,50,62.5,75,87.5].forEach(p=>{

    const div = document.createElement('div');

    div.className =
      'milestone-mark' + ((p % 25 === 0) ? ' major':'');

    div.style.left = p + '%';

    track.appendChild(div);
  });

  const recent12 = allRows.slice(-12);

  const avgSave =
    recent12.reduce((s,r)=>s+r.save,0) / recent12.length;

  const scenarios = [
    {
      key:'conservative',
      label:'Conservative',
      cls:'conservative',
      annualRate:0.05,
      pmtFactor:0.9,
      note:'5% annual return'
    },
    {
      key:'realistic',
      label:'Realistic',
      cls:'realistic',
      annualRate:0.09,
      pmtFactor:1.0,
      note:'9% annual return'
    },
    {
      key:'ambitious',
      label:'Ambitious',
      cls:'ambitious',
      annualRate:0.14,
      pmtFactor:1.1,
      note:'14% annual return'
    }
  ];

  const scenarioContainer =
    document.getElementById('scenarioContainer');

  scenarioContainer.innerHTML = '';

  scenarios.forEach(sc=>{

    const pmt = avgSave * sc.pmtFactor;

    const months = monthsToTargetAnnuity(
      lastNW,
      sc.annualRate,
      pmt
    );

    const future = addMonths(lastRow, months);

    const card = document.createElement('div');

    card.className =
      `scenario-card ${sc.cls} ${selectedScenario===sc.key?'selected':''}`;

    card.innerHTML = `
      <div class="scenario-label">
        <div class="scenario-radio"></div>
        ${sc.label}
      </div>

      <div class="scenario-date">
        ${future.month.slice(0,3)} ${future.year}
      </div>

      <div class="scenario-detail">
        ${months} months · ${(months/12).toFixed(1)} years
      </div>

      <div class="scenario-rate">
        ${sc.note}
        <br>
        + ${fmt(pmt)}/mo contribution
      </div>
    `;

    card.onclick = ()=>{
      selectedScenario = sc.key;
      renderGoalTile();
    };

    scenarioContainer.appendChild(card);
  });

  const selected = scenarios.find(
    s=>s.key===selectedScenario
  );

  const futureMilestones =
    [375000,500000,750000,1000000]
    .filter(v=>v>lastNW)
    .map(target=>{

      const pmt =
        avgSave * selected.pmtFactor;

      const months =
        monthsToTargetAnnuity(
          lastNW,
          selected.annualRate,
          pmt,
          target
        );

      const date =
        addMonths(lastRow, months);

      return {
        value:target,
        date
      };
    });

  document.getElementById('selectedDetails').innerHTML = `
    <div class="selected-details">

      <div class="selected-details-title">
        ${selected.label} Scenario — Future Milestones
      </div>

      <div class="milestone-timeline">

      ${futureMilestones.map(m=>`
        <div class="milestone-item">
          <div class="dot"></div>
          <div class="value">${fmt(m.value)}</div>
          <div class="date">
            → ${m.date.month.slice(0,3)} ${m.date.year}
          </div>
        </div>
      `).join('')}

      </div>

    </div>
  `;
}

function attachHover(){

  const track = document.getElementById('goalTrack');

  const tooltip =
    document.getElementById('goalTooltip');

  track.addEventListener('mousemove',e=>{

    const rect = track.getBoundingClientRect();

    const x = e.clientX - rect.left;

    const pct = Math.max(
      0,
      Math.min(100,(x / rect.width) * 100)
    );

    const value = pct / 100 * 1000000;

    tooltip.style.left = x + 'px';

    tooltip.style.display = 'block';

    tooltip.textContent =
      `${fmt(value)} (${pct.toFixed(1)}%)`;
  });

  track.addEventListener('mouseleave',()=>{
    tooltip.style.display = 'none';
  });
}

renderGoalTile();

attachHover();

</script>

</body>
</html>
